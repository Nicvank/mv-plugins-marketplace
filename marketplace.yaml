  - name: "theme-customizer"
    display_name: "主题自定义"
    description: "自定义应用主题颜色、字体、CSS 变量，支持 5 个预设主题"
    long_description: |
      主题自定义插件让你完全掌控 Memory Fragments 的视觉风格。

      ## 预设主题
      - 🌞 **默认** — 清爽蓝色
      - 🌙 **暗黑** — 深色护眼
      - 🔥 **暖色** — 温暖橙色
      - 🌿 **自然** — 森林绿色
      - 🌊 **海洋** — 海洋蓝色

      ## 自定义内容
      - 🎨 **颜色** — 20+ CSS 变量，颜色选择器编辑
      - ✏️ **自定义 CSS** — 直接编写 CSS 代码
      - 🔤 **字体管理** — 上传自定义字体（TTF/OTF/WOFF/WOFF2）
      - 📦 **导入/导出** — 主题配置文件导入导出
