# Memory Fragments 插件市场索引
# 此文件定义了市场中可用的插件列表
# source_type: github (独立仓库) | embedded (本仓库内)

name: "Official Memory Fragments Plugins"
description: "官方插件市场 — 记忆碎片应用的扩展插件集合"
version: "2.0.0"
homepage: "https://github.com/Nicvank/memory-fragments-plugins-marketplace"

plugins:
  - name: "heatmap"
    display_name: "记忆热力图"
    description: "GitHub 风格的日历热力图，按年/月/日三级视图展示记忆活动分布"
    long_description: |
      记忆热力图插件为 Memory Fragments 提供 GitHub 贡献图风格的日历可视化。

      ## 功能特性
      - 📅 三级视图：年→月→日，逐级钻取
      - 🎨 4 种配色方案：绿色、蓝色、紫色、暖色
      - 😊 悬停显示每日记忆数和主导情绪
      - ⚙️ 可配置情绪显示、年份范围
      - 📱 响应式设计，移动端横向滚动

      ## 使用方法
      启用插件后，侧边栏会出现「记忆热力图」入口。点击年份可钻取到月份视图，点击月份可查看日历。
    version: "2.0.0"
    author: "Memory Visions"
    type: "visualization"
    license: "MIT"
    icon: "calendar"
    source_type: "github"
    source_url: "https://github.com/Nicvank/memory-fragments-plugin-heatmap"
    homepage: "https://github.com/Nicvank/memory-fragments-plugin-heatmap"
    tags: ["可视化", "日历", "热力图"]
    screenshots: []
    changelog: |
      v2.0.0 - 完全重构：新增 Vue 前端组件、配置系统生效、SVG 图标、日视图
      v1.4.0 - 新增暖色配色方案
      v1.3.0 - 支持情绪颜色显示
      v1.2.0 - 新增月度视图
      v1.1.0 - 响应式布局优化
      v1.0.0 - 首次发布

  - name: "data-export"
    display_name: "数据导出"
    description: "将记忆、人物、关系数据导出为 JSON、CSV 或 Markdown 格式"
    long_description: |
      数据导出插件让你可以将记忆数据导出为多种格式，方便备份和迁移。

      ## 支持格式
      - **JSON** — 完整数据结构，适合程序处理
      - **CSV** — 表格格式，可用 Excel 打开（UTF-8 BOM）
      - **Markdown** — 可读性强，适合文档归档

      ## 功能特性
      - 📦 批量导出记忆、人物、关系
      - 🔍 按时间范围、人物筛选
      - 📋 导出历史记录
      - ⚙️ 可配置默认格式和叙事包含
    version: "2.0.0"
    author: "Memory Visions"
    type: "tool"
    license: "MIT"
    icon: "export_icon"
    source_type: "github"
    source_url: "https://github.com/Nicvank/memory-fragments-plugin-data-export"
    homepage: "https://github.com/Nicvank/memory-fragments-plugin-data-export"
    tags: ["导出", "数据", "备份"]
    screenshots: []
    changelog: |
      v2.0.0 - 完全重构：新增 Vue 导出表单 UI、配置系统生效、SVG 图标、下载历史
      v1.1.0 - API 修复
      v1.0.0 - 首次发布

  - name: "stats-dashboard"
    display_name: "统计仪表盘"
    description: "记忆数据统计分析，卡片图表展示趋势和分布"
    long_description: |
      统计仪表盘为你的记忆数据提供全方位的分析视图。

      ## 分析维度
      - 📈 **概览** — 记忆总数、人物数、关系数、时间跨度
      - 😊 **情感分布** — 各种情绪的占比和月度变化
      - 📅 **时间线** — 按周/月/年统计记忆数量
      - 👥 **人物频率** — 最常出现的人物排行
      - 🏷️ **标签分布** — 最常使用的标签和分类

      ## 图表类型
      - 纯 CSS 柱状图、标签云、排行列表
      - 支持按周/月/年/全部切换时间粒度
    version: "2.0.0"
